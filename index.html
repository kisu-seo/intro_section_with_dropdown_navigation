<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO: 페이지 제목 -->
  <title>Snap – Make Remote Work</title>

  <!-- SEO: 페이지 설명 -->
  <meta name="description"
    content="Get your team in sync, no matter your location. Streamline processes, create team rituals, and watch productivity soar." />

  <!-- Google Fonts: Epilogue (Medium 500, Bold 700) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@500;700&display=swap" rel="stylesheet" />

  <!-- 스타일시트 연결 -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <!-- =====================================================
       HEADER: 로고 + 내비게이션 + 로그인/회원가입
       ===================================================== -->
  <header class="header" role="banner">

    <!-- 로고 -->
    <a href="/" class="header__logo" aria-label="Snap 홈으로 이동">
      <!-- alt="Snap": 로고 이미지임을 간결하게 전달 (브랜드명만으로 충분) -->
      <img src="./images/logo.svg" alt="Snap" width="84" height="27" />
    </a>

    <!-- 메인 내비게이션 (데스크톱: 가로 배치 / 모바일: 사이드바) -->
    <nav class="nav" id="main-nav" aria-label="메인 내비게이션">

      <!-- 사이드바 닫기 버튼 (모바일에서만 보임: X 아이콘) -->
      <!-- [접근성 의도] X 모양 아이콘(이미지)뿐이라면, 스크린 리더는 이 버튼이 무슨 버튼인지 읽을 수 없습니다.
           `aria-label="메뉴 닫기"`를 넣어주면 화면에는 안 보이지만 기계에게 명확한 이름을 제공하게 됩니다. -->
      <button class="nav__close" id="btn-nav-close" aria-label="메뉴 닫기">
        <img src="./images/icon-close-menu.svg" alt="" aria-hidden="true" width="26" height="26" />
      </button>

      <ul class="nav__list" role="list">

        <!-- Features 메뉴 (드롭다운 있음) -->
        <!-- [접근성(A11y) 핵심 속성 설명]
             - aria-expanded: 화면을 볼 수 없는 분들이 스크린 리더기를 사용할 때, 이 메뉴가 현재 '펼쳐졌는지' 혹은 '접혔는지'를 음성으로 알려주는 안내판 역할을 합니다.
             - aria-haspopup: 이 버튼이 단순한 링크가 아니라, 누르면 하위에 '서브 메뉴(팝업)'가 열릴 것이라고 기계에게 미리 귀띔해줍니다.
             - aria-controls: 여러 메뉴 중에 어떤 하위 서랍(id)을 켜고 꺼야 하는지 서로 논리적인 다리(Link)를 연결해주는 표지판입니다. -->
        <li class="nav__item nav__item--dropdown">
          <button class="nav__btn" id="btn-features" aria-expanded="false" aria-haspopup="true"
            aria-controls="dropdown-features">
            Features
            <!-- [접근성 의도] 화살표 이미지는 단순히 펼쳐졌다는 걸 눈으로 보여주는 시각적 장식일 뿐입니다. 기계가 "메뉴 활성" 이라고 읽을 때 굳이 "이미지"라고 같이 읽지 않도록 `aria-hidden="true"`로 숨겨줍니다. -->
            <img class="nav__arrow" src="./images/icon-arrow-down.svg" alt="" aria-hidden="true" width="10"
              height="6" />
          </button>

          <!-- Features 드롭다운 콘텐츠 -->
          <ul class="dropdown dropdown--features" id="dropdown-features" role="list" aria-label="Features 하위 메뉴">
            <li class="dropdown__item">
              <a href="#" class="dropdown__link">
                <img src="./images/icon-todo.svg" alt="" aria-hidden="true" class="dropdown__icon" />
                Todo List
              </a>
            </li>
            <li class="dropdown__item">
              <a href="#" class="dropdown__link">
                <img src="./images/icon-calendar.svg" alt="" aria-hidden="true" class="dropdown__icon" />
                Calendar
              </a>
            </li>
            <li class="dropdown__item">
              <a href="#" class="dropdown__link">
                <img src="./images/icon-reminders.svg" alt="" aria-hidden="true" class="dropdown__icon" />
                Reminders
              </a>
            </li>
            <li class="dropdown__item">
              <a href="#" class="dropdown__link">
                <img src="./images/icon-planning.svg" alt="" aria-hidden="true" class="dropdown__icon" />
                Planning
              </a>
            </li>
          </ul>
        </li>

        <!-- Company 메뉴 (드롭다운 있음) -->
        <li class="nav__item nav__item--dropdown">
          <button class="nav__btn" id="btn-company" aria-expanded="false" aria-haspopup="true"
            aria-controls="dropdown-company">
            Company
            <img class="nav__arrow" src="./images/icon-arrow-down.svg" alt="" aria-hidden="true" width="10"
              height="6" />
          </button>

          <!-- Company 드롭다운 콘텐츠 (아이콘 없음) -->
          <ul class="dropdown dropdown--right dropdown--company" id="dropdown-company" role="list"
            aria-label="Company 하위 메뉴">
            <li class="dropdown__item">
              <a href="#" class="dropdown__link">History</a>
            </li>
            <li class="dropdown__item">
              <a href="#" class="dropdown__link">Our Team</a>
            </li>
            <li class="dropdown__item">
              <a href="#" class="dropdown__link">Blog</a>
            </li>
          </ul>
        </li>

        <!-- Careers 메뉴 (드롭다운 없음) -->
        <li class="nav__item">
          <a href="#" class="nav__link">Careers</a>
        </li>

        <!-- About 메뉴 (드롭다운 없음) -->
        <li class="nav__item">
          <a href="#" class="nav__link">About</a>
        </li>
      </ul>

      <!-- 오른쪽: 로그인/회원가입 버튼 -->
      <div class="nav__auth">
        <a href="#" class="btn btn--ghost nav__btn-login">Login</a>
        <a href="#" class="btn btn--outline nav__btn-register">Register</a>
      </div>
    </nav>

    <!-- 햄버거 버튼 (모바일에서만 보임) -->
    <!-- [접근성 의도] 이미지만 존재하는 버튼이므로 시각장애인 분들을 위한 `aria-label`로 숨은 이름(텍스트)을 달아주어 길잡이가 되게 합니다. -->
    <button class="header__hamburger" id="btn-hamburger" aria-label="메뉴 열기" aria-expanded="false"
      aria-controls="main-nav">
      <img src="./images/icon-menu.svg" alt="" aria-hidden="true" width="32" height="18" />
    </button>
  </header>

  <!-- =====================================================
       OVERLAY: 모바일 메뉴 열렸을 때 배경 어둡게 처리
       클릭하면 메뉴가 닫힘
       ===================================================== -->
  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <!-- =====================================================
       MAIN: 히어로 섹션
       ===================================================== -->
  <main class="main main--hero-page">
    <section class="hero" aria-labelledby="hero-title">

      <!-- 히어로 이미지 (모바일: 상단 / 데스크톱: 우측) -->
      <!-- [의도: 왜 <img> 단독 대신 <picture> 태그를 사용했는가?]
           1) 구도 변경(Art Direction): 모바일용(가로형)과 데스크톱용(세로형) 이미지의 단순 크기를 넘어 비율/화각 자체가 다릅니다. 디자인 의도를 정확히 맞추기 위함입니다.
           2) 성능 최적화: CSS 단에서 display:none으로 두 이미지를 숨기고 보여준다면 사용자는 불필요하게 이미지 두 장을 전부 다운로드해야 합니다(데이터 낭비).
           <picture>와 <source>를 사용하면 브라우저가 접속한 기기 화면 크기를 먼저 파악해서 알맞은 최적의 이미지만 똑똑하게 하나 다운로드합니다. -->
      <div class="hero__image-wrap">
        <picture>
          <source media="(min-width: 1024px)" srcset="./images/image-hero-desktop.png" />
          <img src="./images/image-hero-mobile.png" alt="Work from anywhere" class="hero__image" width="375"
            height="300" />
        </picture>
      </div>

      <!-- 히어로 텍스트 콘텐츠 -->
      <div class="hero__content">
        <!-- h1: 페이지 내 가장 중요한 제목, 한 페이지에 하나만 -->
        <!-- <br> 제거: CSS의 max-width로 줄바꿈을 자연스럽게 제어 -->
        <h1 class="hero__title" id="hero-title">Make remote work</h1>

        <p class="hero__desc">
          Get your team in sync, no matter your location.
          Streamline processes, create team rituals, and watch productivity soar.
        </p>

        <a href="#" class="btn btn--primary hero__cta">
          Learn more
        </a>

        <!-- 클라이언트 로고 목록 -->
        <div class="hero__clients" aria-label="파트너사 목록">
          <img src="./images/client-databiz.svg" alt="Databiz" class="hero__client-logo" />
          <img src="./images/client-audiophile.svg" alt="Audiophile" class="hero__client-logo" />
          <img src="./images/client-meet.svg" alt="Meet" class="hero__client-logo" />
          <img src="./images/client-maker.svg" alt="Maker" class="hero__client-logo" />
        </div>
      </div>
    </section>
  </main>

  <!-- 자바스크립트 연결 (body 맨 아래: HTML이 다 그려진 후 실행) -->
  <script src="./script.js"></script>

</body>

</html>
